document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iv data-screen-label=\"الظرف\" sc-camel-on-click=\"{{ openEnvelope }}\" style=\"height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 44px; cursor: pointer; background: radial-gradient(ellipse at 50% 35%, oklch(42% 0.12 18), oklch(30% 0.09 18));\">\n\n      <!-- envelope -->\n      <div style=\"position: relative; width: 400px; max-width: 86vw; height: 264px; animation: floaty 3.5s ease-in-out infinite;\">\n        <!-- letter peeking -->\n        <div style=\"position: absolute; left: 7%; right: 7%; top: 12px; bottom: 12px; background: oklch(98% 0.012 85); border-radius: 4px; z-index: 1; transform: {{ letterPeekTransform }}; transition: transform 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.35s; display: flex; align-items: flex-start; justify-content: center; padding-top: 14px; box-shadow: 0 4px 18px oklch(0% 0 0 / 0.25);\">\n          <span style=\"font-family: 'Amiri', serif; font-size: 17px; color: oklch(48% 0.13 18);\">﷽<\u002Fspan>\n        <\u002Fdiv>\n        <!-- body -->\n        <div style=\"position: absolute; inset: 0; top: 34%; background: linear-gradient(180deg, oklch(88% 0.045 85), oklch(82% 0.055 85)); border-radius: 6px; z-index: 2; box-shadow: 0 18px 44px oklch(0% 0 0 / 0.35);\"><\u002Fdiv>\n        <!-- side folds -->\n        <div style=\"position: absolute; inset: 0; top: 34%; z-index: 3; border-radius: 6px; background: linear-gradient(115deg, oklch(84% 0.05 85) 0%, oklch(84% 0.05 85) 46%, transparent 46.5%), linear-gradient(-115deg, oklch(86% 0.05 85) 0%, oklch(86% 0.05 85) 46%, transparent 46.5%);\"><\u002Fdiv>\n        <!-- flap -->\n        <div style=\"position: absolute; left: 0; right: 0; top: 34%; height: 62%; z-index: {{ flapZ }}; transform-origin: top center; transform: {{ flapTransform }}; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1), z-index 0s 0.35s;\">\n          <div style=\"width: 100%; height: 100%; clip-path: polygon(0 0, 100% 0, 50% 78%); background: linear-gradient(180deg, oklch(78% 0.06 85), oklch(72% 0.07 85)); border-radius: 6px 6px 0 0;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- wax seal -->\n        <div style=\"position: absolute; left: 50%; top: 74%; transform: translate(-50%, -50%) scale({{ sealScale }}); z-index: 5; width: 62px; height: 62px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, oklch(72% 0.13 75), oklch(56% 0.13 60)); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px oklch(0% 0 0 / 0.35); transition: transform 0.4s ease; font-family: 'Amiri', serif; font-weight: 700; font-size: 24px; color: oklch(92% 0.04 85);\">م<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size: 16px; color: oklch(88% 0.03 85); animation: pulse 2.2s ease-in-out infinite; letter-spacing: 1px;\">اضغط لفتح الرسالة<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ====== STAGE 2: THE LETTER (verse + hadith) ====== -->\n  <sc-if value=\"{{ showLetter }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"الرسالة\" style=\"height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(ellipse at 50% 35%, oklch(42% 0.12 18), oklch(30% 0.09 18));\">\n      <div style=\"background: oklch(98% 0.012 85); border-radius: 10px; max-width: 720px; width: 100%; max-height: 92vh; overflow-y: auto; padding: 56px 44px; text-align: center; box-shadow: 0 30px 80px oklch(0% 0 0 / 0.45); animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) both; border: 1px solid oklch(88% 0.04 85);\">\n        <div style=\"font-family: 'Amiri', serif; font-size: 26px; color: oklch(34% 0.10 18); margin-bottom: 10px;\">بسم الله الرحمن الرحيم<\u002Fdiv>\n        <div style=\"font-family: 'Amiri', serif; font-size: 19px; color: oklch(40% 0.02 75); margin-bottom: 36px;\">السلام عليكم ورحمة الله وبركاته<\u002Fdiv>\n\n        <div style=\"width: 54px; height: 2px; background: oklch(48% 0.13 18); opacity: 0.5; margin: 0 auto 36px;\"><\u002Fdiv>\n\n        <div style=\"font-family: 'Amiri', serif; font-size: 15px; color: oklch(48% 0.02 75); margin-bottom: 10px;\">تطبيقًا لقول الله تعالى<\u002Fdiv>\n        <p style=\"font-family: 'Amiri', serif; font-size: 25px; line-height: 2.15; color: oklch(42% 0.12 18); margin: 0 0 34px;\">﴿يَا أَيُّهَا النَّاسُ إِنَّا خَلَقْنَاكُم مِّن ذَكَرٍ وَأُنثَىٰ وَجَعَلْنَاكُمْ شُعُوبًا وَقَبَائِلَ لِتَعَارَفُوا ۚ إِنَّ أَكْرَمَكُمْ عِندَ اللَّهِ أَتْقَاكُمْ﴾<\u002Fp>\n\n        <div style=\"font-family: 'Amiri', serif; font-size: 15px; color: oklch(48% 0.02 75); margin-bottom: 10px;\">ويقول النبي ﷺ<\u002Fdiv>\n        <p style=\"font-family: 'Amiri', serif; font-size: 22px; line-height: 2; color: oklch(30% 0.02 75); margin: 0 0 44px;\">«الأرواح جنود مجندة فما تعارف منها ائتلف وما تناكر منها اختلف»<\u002Fp>\n\n        <button sc-camel-on-click=\"{{ startSlides }}\" style=\"font-family: 'Tajawal', sans-serif; font-size: 17px; font-weight: 700; color: oklch(97% 0.01 85); background: oklch(48% 0.13 18); border: none; border-radius: 6px; padding: 14px 46px; cursor: pointer; box-shadow: 0 6px 18px oklch(48% 0.13 18 / 0.4);\" style-hover=\"background: oklch(42% 0.13 18);\">متابعة القراءة<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ====== STAGE 3: SLIDES ====== -->\n  <sc-if value=\"{{ showSlides }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"height: 100vh; position: relative; background: oklch(97% 0.014 75);\">\n\n      <!-- header: fixed position -->\n      <div style=\"position: fixed; top: 0; left: 0; right: 0; z-index: 30; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 26px; background: oklch(98% 0.01 75 / 0.92); backdrop-filter: blur(10px); border-bottom: 1px solid oklch(88% 0.012 75);\">\n        <div style=\"font-family: 'El Messiri', serif; font-weight: 700; font-size: 19px; color: oklch(34% 0.10 18);\">مازن رزاز المرتبي<\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 14px;\">\n          <span style=\"font-size: 14px; color: oklch(48% 0.02 75); direction: ltr;\">{{ counter }}<\u002Fspan>\n          <div style=\"width: 160px; height: 4px; background: oklch(90% 0.012 75); border-radius: 2px; overflow: hidden;\">\n            <div style=\"height: 100%; background: oklch(48% 0.13 18); border-radius: 2px; width: {{ progressW }}; transition: width 0.5s ease;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- smooth scroll + scroll snap container -->\n      <div ref=\"{{ scrollRef }}\" sc-camel-on-scroll=\"{{ onScroll }}\" style=\"height: 100vh; overflow-y: auto; scroll-behavior: smooth; scroll-snap-type: y proximity;\">\n\n          <!-- SLIDE 1: المقدمة -->\n          <div data-screen-label=\"1 المقدمة\" style=\"min-height: 100vh; scroll-snap-align: start; background: oklch(97% 0.014 75); padding: 110px 28px 90px;\">\n            <div style=\"max-width: 760px; margin: 0 auto; text-align: center;\">\n              <h2 style=\"font-family: 'El Messiri', serif; font-weight: 700; font-size: 36px; color: oklch(24% 0.02 75); margin: 0 0 8px;\">المقدمة<\u002Fh2>\n              <div style=\"width: 40px; height: 3px; background: oklch(48% 0.13 18); margin: 0 auto 36px;\"><\u002Fdiv>\n              <p style=\"font-size: 19px; color: oklch(28% 0.02 75); margin: 0 0 22px; line-height: 2;\">يسرني أن أقدم لكم نبذة مختصرة عني، راجيًا من الله أن يكتب الخير للجميع.<\u002Fp>\n              <p style=\"font-size: 19px; color: oklch(28% 0.02 75); margin: 0 0 22px; line-height: 2;\">أنا ابنكم <strong>مازن رزاز أحمد عبدالسلام المرتبي<\u002Fstrong> من محافظة تعز، مديرية شرعب الرونة، منطقة بني زياد، وأتشرف بالتقدم لخطبة ابنتكم الكريمة <strong>هديل جيد حسن جيد<\u002Fstrong>، على سنة الله ورسوله.<\u002Fp>\n              <p style=\"font-size: 19px; color: oklch(28% 0.02 75); margin: 0; line-height: 2;\">وفي هذه الصفحات نبذةٌ عني وعن أسرتي، تكون بدايةً لتعارفٍ صادقٍ يجمعنا على الخير والمودّة.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- SLIDE 2: من أنا -->\n          <div data-screen-label=\"2 من أنا\" style=\"min-height: 100vh; scroll-snap-align: start; background: oklch(97% 0.014 75); padding: 110px 28px 90px;\">\n            <div style=\"max-width: 760px; margin: 0 auto;\">\n              <h2 style=\"font-family: 'El Messiri', serif; font-weight: 700; font-size: 36px; color: oklch(24% 0.02 75); margin: 0 0 8px; text-align: center;\">من أنا<\u002Fh2>\n              <div style=\"width: 40px; height: 3px; background: oklch(48% 0.13 18); margin: 0 auto 34px;\"><\u002Fdiv>\n              <p style=\"font-size: 17px; color: oklch(30% 0.02 75); margin: 0 0 20px; line-height: 2;\">أنا مازن رزاز أحمد عبدالسلام المرتبي. ولدت عام 1999 في محافظة تعز، ونشأت في مديرية شرعب الرونة بمنطقة بني زياد، وسط أسرة محافظة تعلمت منها قيم الاحترام وتحمل المسؤولية والاعتماد على النفس.<\u002Fp>\n              <p style=\"font-size: 17px; color: oklch(30% 0.02 75); margin: 0 0 20px; line-height: 2;\">أمضيت طفولتي ودراستي في مسقط رأسي حتى سن السادسة عشرة، وخلال الإجازات الدراسية كنت أتنقل بين صنعاء وعدن وإب، وهو ما وسّع مداركي وعزز قدرتي على التأقلم مع مختلف البيئات.<\u002Fp>\n              <p style=\"font-size: 17px; color: oklch(30% 0.02 75); margin: 0 0 20px; line-height: 2;\">في بداية عام 2016 انتقلت من تعز إلى محافظة إب، ثم إلى صنعاء لإكمال دراستي الجامعية، وهناك حصلت على درجة البكالوريوس في علوم الحاسوب.<\u002Fp>\n              <p style=\"font-size: 17px; color: oklch(30% 0.02 75); margin: 0 0 20px; line-height: 2;\">ومنذ السنة الثانية في الجامعة بدأت العمل بالتوازي مع الدراسة، إيمانًا مني بأن الخبرة العملية جزء أساسي من بناء الإنسان، فعملت لمدة ثلاث سنوات مع شركات وفرق مختلفة لاكتساب الخبرة وتطوير مهاراتي.<\u002Fp>\n              <p style=\"font-size: 17px; color: oklch(30% 0.02 75); margin: 0 0 20px; line-height: 2;\">وفي شهر يونيو من عام 2025 انتقلت إلى المملكة العربية السعودية، ثم أصبحت أتنقل بين المملكة العربية السعودية وجمهورية مصر العربية بحكم طبيعة عملي.<\u002Fp>\n              <p style=\"font-size: 17px; color: oklch(30% 0.02 75); margin: 0 0 20px; line-height: 2;\">أعمل اليوم بشكل مستقل مع عدد من الشركات في مجال تطوير وإدارة وتحسين الظهور على خرائط Google والحضور الرقمي للأنشطة التجارية، وأسعى إلى بناء كيان مهني خاص بي يعتمد على الاحترافية والثقة والاستمرارية، مع الحرص على التطوير المستمر ومواكبة كل جديد في مجالي.<\u002Fp>\n              <p style=\"font-size: 17px; color: oklch(30% 0.02 75); margin: 0; line-height: 2;\">وأؤمن أن النجاح الحقيقي لا يقاس بالعمل فقط، بل بحسن الخلق، وتحمل المسؤولية، وبر الوالدين، والوفاء بالوعد، وبناء أسرة مستقرة تقوم على المودة والرحمة والاحترام.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- SLIDE 3: معلومات شخصية -->\n          <div data-screen-label=\"3 معلومات شخصية\" style=\"min-height: 100vh; scroll-snap-align: start; background: oklch(97% 0.014 75); padding: 110px 28px 90px;\">\n            <div style=\"max-width: 700px; margin: 0 auto;\">\n              <h2 style=\"font-family: 'El Messiri', serif; font-weight: 700; font-size: 36px; color: oklch(24% 0.02 75); margin: 0 0 8px; text-align: center;\">معلومات شخصية<\u002Fh2>\n              <div style=\"width: 40px; height: 3px; background: oklch(48% 0.13 18); margin: 0 auto 34px;\"><\u002Fdiv>\n              <div style=\"background: oklch(99% 0.008 75); border: 1px solid oklch(89% 0.012 75); border-radius: 8px; overflow: hidden;\">\n                <div style=\"display: flex; justify-content: space-between; gap: 18px; padding: 18px 26px; border-bottom: 1px solid oklch(91% 0.01 75);\">\n                  <span style=\"color: oklch(48% 0.02 75); font-size: 15px; white-space: nowrap;\">الاسم الكامل<\u002Fspan>\n                  <span style=\"font-weight: 700; font-size: 16px; text-align: left;\">مازن رزاز أحمد عبدالسلام المرتبي<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display: flex; justify-content: space-between; gap: 18px; padding: 18px 26px; border-bottom: 1px solid oklch(91% 0.01 75);\">\n                  <span style=\"color: oklch(48% 0.02 75); font-size: 15px;\">سنة الميلاد<\u002Fspan>\n                  <span style=\"font-weight: 700; font-size: 16px;\">1999<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display: flex; justify-content: space-between; gap: 18px; padding: 18px 26px; border-bottom: 1px solid oklch(91% 0.01 75);\">\n                  <span style=\"color: oklch(48% 0.02 75); font-size: 15px;\">مكان الميلاد<\u002Fspan>\n                  <span style=\"font-weight: 700; font-size: 16px;\">محافظة تعز<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display: flex; justify-content: space-between; gap: 18px; padding: 18px 26px; border-bottom: 1px solid oklch(91% 0.01 75);\">\n                  <span style=\"color: oklch(48% 0.02 75); font-size: 15px;\">الأصل<\u002Fspan>\n                  <span style=\"font-weight: 700; font-size: 16px; text-align: left;\">مديرية شرعب الرونة، منطقة بني زياد<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display: flex; justify-content: space-between; gap: 18px; padding: 18px 26px; border-bottom: 1px solid oklch(91% 0.01 75);\">\n                  <span style=\"color: oklch(48% 0.02 75); font-size: 15px;\">المؤهل العلمي<\u002Fspan>\n                  <span style=\"text-align: left;\">\n                    <span style=\"font-weight: 700; font-size: 16px; display: block;\">بكالوريوس علوم الحاسوب<\u002Fspan>\n                    <span style=\"font-size: 13px; color: oklch(52% 0.02 75); display: block; margin-top: 2px;\">جامعة العلوم والتكنولوجيا، صنعاء (UST)<\u002Fspan>\n                  <\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display: flex; justify-content: space-between; gap: 18px; padding: 18px 26px;\">\n                  <span style=\"color: oklch(48% 0.02 75); font-size: 15px; white-space: nowrap;\">العمل الحالي<\u002Fspan>\n                  <span style=\"font-weight: 700; font-size: 16px; text-align: left;\">أعمل بشكل مستقل مع عدة شركات في مجال تطوير وإدارة خرائط Google والحضور الرقمي<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- SLIDE 4: الأسرة -->\n          <div data-screen-label=\"4 الأسرة\" style=\"min-height: 100vh; scroll-snap-align: start; background: oklch(97% 0.014 75); padding: 110px 28px 90px;\">\n            <div style=\"max-width: 860px; margin: 0 auto;\">\n              <h2 style=\"font-family: 'El Messiri', serif; font-weight: 700; font-size: 36px; color: oklch(24% 0.02 75); margin: 0 0 8px; text-align: center;\">الأسرة<\u002Fh2>\n              <div style=\"width: 40px; height: 3px; background: oklch(48% 0.13 18); margin: 0 auto 34px;\"><\u002Fdiv>\n              <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 22px;\">\n                <div style=\"background: oklch(99% 0.008 75); border: 1px solid oklch(89% 0.012 75); border-radius: 8px; padding: 24px;\">\n                  <div style=\"font-size: 13px; color: oklch(50% 0.02 75); margin-bottom: 6px;\">الوالد<\u002Fdiv>\n                  <div style=\"font-size: 20px; font-weight: 700; margin-bottom: 10px;\">رزاز أحمد عبدالسلام المرتبي<\u002Fdiv>\n                  <div style=\"font-size: 15px; color: oklch(38% 0.02 75); margin-bottom: 4px;\">بكالوريوس إدارة أعمال، جامعة صنعاء<\u002Fdiv>\n                  <div style=\"font-size: 15px; color: oklch(38% 0.02 75); margin-bottom: 4px;\">يعمل في مجال المقاولات والبناء بمدينة جدة<\u002Fdiv>\n                  <div style=\"font-size: 15px; color: oklch(38% 0.02 75); margin-bottom: 6px;\">ويمتلك محلًا لتأجير مواد البناء في سوق السامر التجاري<\u002Fdiv>\n                  <div style=\"font-size: 13px; color: oklch(55% 0.02 75);\">للتواصل مع الوالد، انظر قسم «جهات مرجعية» في الأسفل.<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background: oklch(99% 0.008 75); border: 1px solid oklch(89% 0.012 75); border-radius: 8px; padding: 24px;\">\n                  <div style=\"font-size: 13px; color: oklch(50% 0.02 75); margin-bottom: 6px;\">الوالدة<\u002Fdiv>\n                  <div style=\"font-size: 20px; font-weight: 700; margin-bottom: 12px;\">حنان<\u002Fdiv>\n                  <div style=\"font-size: 15px; color: oklch(38% 0.02 75); margin-bottom: 14px;\">ربة منزل<\u002Fdiv>\n                  <div style=\"font-size: 15px; font-weight: 700; color: oklch(30% 0.02 75); direction: ltr; text-align: right; margin-bottom: 10px;\">{{ momNum.display }}<\u002Fdiv>\n                  <div style=\"display: flex; gap: 10px;\">\n                    <a href=\"{{ momNum.tel }}\" style=\"flex: 1; text-align: center; padding: 9px 0; border-radius: 6px; background: oklch(48% 0.13 18); color: oklch(97% 0.01 85); text-decoration: none; font-size: 14px; font-weight: 700;\">اتصال<\u002Fa>\n                    <a href=\"{{ momNum.wa }}\" target=\"_blank\" rel=\"noopener\" style=\"flex: 1; text-align: center; padding: 9px 0; border-radius: 6px; background: oklch(62% 0.15 150); color: oklch(99% 0.01 150); text-decoration: none; font-size: 14px; font-weight: 700;\">واتساب<\u002Fa>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- SLIDE 5: جهات مرجعية -->\n          <div data-screen-label=\"5 جهات مرجعية\" style=\"min-height: 100vh; scroll-snap-align: start; background: oklch(97% 0.014 75); padding: 110px 28px 90px;\">\n            <div style=\"max-width: 1040px; margin: 0 auto;\">\n              <h2 style=\"font-family: 'El Messiri', serif; font-weight: 700; font-size: 36px; color: oklch(24% 0.02 75); margin: 0 0 8px; text-align: center;\">جهات مرجعية للاستفسار عني<\u002Fh2>\n              <div style=\"width: 40px; height: 3px; background: oklch(48% 0.13 18); margin: 0 auto 20px;\"><\u002Fdiv>\n              <p style=\"max-width: 640px; margin: 0 auto 40px; text-align: center; font-size: 16px; color: oklch(38% 0.02 75);\">حرصًا على الشفافية الكاملة، يمكن التواصل مع الأشخاص الآتية أسماؤهم؛ فجميعهم يعرفونني عن قرب ويمكنهم الإجابة عن أي استفسار بكل أمانة.<\u002Fp>\n\n              <sc-for list=\"{{ refGroups }}\" as=\"g\" hint-placeholder-count=\"7\">\n                <div style=\"margin-bottom: 34px;\">\n                  <div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 16px;\">\n                    <span style=\"font-family: 'El Messiri', serif; font-weight: 700; font-size: 20px; color: oklch(48% 0.13 18);\">{{ g.ord }}<\u002Fspan>\n                    <span style=\"font-size: 16px; color: oklch(40% 0.02 75);\">{{ g.title }}<\u002Fspan>\n                    <div style=\"flex: 1; height: 1px; background: oklch(89% 0.012 75);\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px;\">\n                    <sc-for list=\"{{ g.people }}\" as=\"p\" hint-placeholder-count=\"3\">\n                      <div style=\"background: oklch(99% 0.008 75); border: 1px solid oklch(89% 0.012 75); border-radius: 10px; padding: 18px; display: flex; flex-direction: column;\">\n                        <div style=\"font-weight: 700; font-size: 16px; margin-bottom: 4px;\">{{ p.name }}<\u002Fdiv>\n                        <sc-if value=\"{{ p.hasRole }}\" hint-placeholder-val=\"{{ true }}\">\n                          <div style=\"font-size: 14px; color: oklch(48% 0.02 75); margin-bottom: 10px;\">{{ p.role }}<\u002Fdiv>\n                        <\u002Fsc-if>\n                        <sc-for list=\"{{ p.actions }}\" as=\"a\" hint-placeholder-count=\"1\">\n                          <div style=\"margin-top: 8px;\">\n                            <div style=\"font-size: 14px; font-weight: 700; color: oklch(30% 0.02 75); direction: ltr; text-align: right; margin-bottom: 6px;\">{{ a.display }}<\u002Fdiv>\n                            <div style=\"display: flex; gap: 8px;\">\n                              <a href=\"{{ a.tel }}\" style=\"flex: 1; text-align: center; padding: 9px 0; border-radius: 6px; background: oklch(48% 0.13 18); color: oklch(97% 0.01 85); text-decoration: none; font-size: 13px; font-weight: 700;\">اتصال<\u002Fa>\n                              <a href=\"{{ a.wa }}\" target=\"_blank\" rel=\"noopener\" style=\"flex: 1; text-align: center; padding: 9px 0; border-radius: 6px; background: oklch(62% 0.15 150); color: oklch(99% 0.01 150); text-decoration: none; font-size: 13px; font-weight: 700;\">واتساب<\u002Fa>\n                            <\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- SLIDE 6: لماذا الموقع -->\n          <div data-screen-label=\"6 لماذا الموقع\" style=\"min-height: 100vh; scroll-snap-align: start; background: oklch(97% 0.014 75); padding: 110px 28px 90px;\">\n            <div style=\"max-width: 760px; margin: 0 auto;\">\n              <h2 style=\"font-family: 'El Messiri', serif; font-weight: 700; font-size: 36px; color: oklch(24% 0.02 75); margin: 0 0 8px; text-align: center;\">لماذا أنشأت هذا الموقع<\u002Fh2>\n              <div style=\"width: 40px; height: 3px; background: oklch(48% 0.13 18); margin: 0 auto 34px;\"><\u002Fdiv>\n              <p style=\"font-size: 17px; color: oklch(30% 0.02 75); margin: 0 0 20px; line-height: 2;\">إيمانًا مني بأن التعارف الصادق يبدأ من الوضوح، جمعت في هذا الموقع كل ما قد يُعين من أراد أن يسأل أو يطمئن، توفيرًا للوقت وتيسيرًا للتواصل.<\u002Fp>\n              <p style=\"font-size: 17px; color: oklch(30% 0.02 75); margin: 0 0 20px; line-height: 2;\">وقد حرصت على أن تكون جميع المعلومات الواردة صحيحة ودقيقة، كما أدرجت بيانات التواصل مع والدي وعدد من أفراد أسرتي وأقاربي وأصدقائي ومدرائي السابقين وزملاء العمل، حتى يكون لمن يرغب في السؤال مرجع واضح يمكنه الرجوع إليه بكل أريحية.<\u002Fp>\n              <p style=\"font-size: 17px; color: oklch(30% 0.02 75); margin: 0 0 26px; line-height: 2;\">وأؤمن أن الثقة تُبنى بالوضوح، وأن حسن السؤال من أسباب الاطمئنان، لذلك أرحب بأي استفسار أو سؤال عني أو عن أسرتي، وأسعد بالإجابة بكل صدق وشفافية.<\u002Fp>\n              <p style=\"font-size: 17px; color: oklch(30% 0.02 75); margin: 0 0 8px; line-height: 2;\">وفي الختام أسأل الله سبحانه وتعالى أن يكتب لنا ولكم الخير، وأن يبارك فيكم وفي أسرتكم، وأن يجعل ما فيه الخير والصلاح هو النصيب، وأن يديم بيننا المحبة والمودة والاحترام.<\u002Fp>\n              <p style=\"font-family: 'Amiri', serif; font-size: 20px; color: oklch(30% 0.02 75); margin: 28px 0 0; text-align: center;\">والسلام عليكم ورحمة الله وبركاته<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- SLIDE 7: تواصل مباشر -->\n          <div data-screen-label=\"7 تواصل مباشر\" style=\"min-height: 100vh; scroll-snap-align: start; background: oklch(34% 0.10 18); color: oklch(97% 0.01 85); padding: 110px 28px 130px;\">\n            <div style=\"max-width: 860px; margin: 0 auto; text-align: center;\">\n              <h2 style=\"font-family: 'El Messiri', serif; font-weight: 700; font-size: 34px; margin: 0 0 8px;\">بيانات التواصل المباشر<\u002Fh2>\n              <div style=\"width: 40px; height: 2px; background: oklch(97% 0.01 85 / 0.4); margin: 0 auto 44px;\"><\u002Fdiv>\n              <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 30px;\">\n                <div>\n                  <div style=\"font-size: 13px; opacity: 0.75; margin-bottom: 10px;\">رقم الجوال (السعودية)<\u002Fdiv>\n                  <div style=\"font-weight: 700; font-size: 19px; direction: ltr; margin-bottom: 12px;\">{{ contactSA.display }}<\u002Fdiv>\n                  <div style=\"display: flex; gap: 8px; justify-content: center;\">\n                    <a href=\"{{ contactSA.tel }}\" style=\"padding: 8px 20px; border-radius: 6px; background: oklch(97% 0.01 85); color: oklch(34% 0.10 18); text-decoration: none; font-size: 14px; font-weight: 700;\">اتصال<\u002Fa>\n                    <a href=\"{{ contactSA.wa }}\" target=\"_blank\" rel=\"noopener\" style=\"padding: 8px 20px; border-radius: 6px; background: oklch(62% 0.15 150); color: oklch(99% 0.01 150); text-decoration: none; font-size: 14px; font-weight: 700;\">واتساب<\u002Fa>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size: 13px; opacity: 0.75; margin-bottom: 10px;\">رقم الجوال (اليمن)<\u002Fdiv>\n                  <div style=\"font-weight: 700; font-size: 19px; direction: ltr; margin-bottom: 12px;\">{{ contactYE.display }}<\u002Fdiv>\n                  <div style=\"display: flex; gap: 8px; justify-content: center;\">\n                    <a href=\"{{ contactYE.tel }}\" style=\"padding: 8px 20px; border-radius: 6px; background: oklch(97% 0.01 85); color: oklch(34% 0.10 18); text-decoration: none; font-size: 14px; font-weight: 700;\">اتصال<\u002Fa>\n                    <a href=\"{{ contactYE.wa }}\" target=\"_blank\" rel=\"noopener\" style=\"padding: 8px 20px; border-radius: 6px; background: oklch(62% 0.15 150); color: oklch(99% 0.01 150); text-decoration: none; font-size: 14px; font-weight: 700;\">واتساب<\u002Fa>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size: 13px; opacity: 0.75; margin-bottom: 10px;\">الموقع الحالي<\u002Fdiv>\n                  <div style=\"font-weight: 700; font-size: 19px;\">جدة، المملكة العربية السعودية<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin-top: 52px; padding-top: 24px; border-top: 1px solid oklch(97% 0.01 85 / 0.2); font-size: 13px; opacity: 0.7;\">\n                آخر تحديث للموقع: {{ lastUpdated }}\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <!-- fixed dots nav -->\n      <div style=\"position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 30; display: flex; align-items: center; gap: 7px; padding: 10px 16px; background: oklch(98% 0.01 75 / 0.92); backdrop-filter: blur(10px); border: 1px solid oklch(88% 0.012 75); border-radius: 999px; box-shadow: 0 8px 24px oklch(0% 0 0 / 0.14);\">\n        <sc-for list=\"{{ dots }}\" as=\"dot\" hint-placeholder-count=\"7\">\n          <button sc-camel-on-click=\"{{ dot.go }}\" style=\"width: {{ dot.size }}; height: 9px; border-radius: 5px; border: none; cursor: pointer; background: {{ dot.bg }}; transition: all 0.3s ease; padding: 0;\"><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- scroll to top button (fixed) -->\n      <button sc-camel-on-click=\"{{ scrollToTop }}\" aria-label=\"العودة للأعلى\" style=\"position: fixed; bottom: 18px; left: 18px; z-index: 30; width: 46px; height: 46px; border-radius: 50%; border: none; background: oklch(48% 0.13 18); color: oklch(97% 0.01 85); font-size: 20px; cursor: pointer; box-shadow: 0 6px 18px oklch(48% 0.13 18 / 0.45); opacity: {{ topBtnOpacity }}; pointer-events: {{ topBtnEvents }}; transition: opacity 0.35s ease;\" style-hover=\"background: oklch(42% 0.13 18);\">↑<\u002Fbutton>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { stage: 'closed', idx: 0, progress: 0, showTop: false };\n  TOTAL = 7;\n  scrollRef = React.createRef();\n\n  componentDidMount() {\n    this._onKey = (e) => {\n      if (this.state.stage !== 'slides') return;\n      if (e.key === 'PageDown') this.goToSection(this.state.idx + 1);\n      if (e.key === 'PageUp') this.goToSection(this.state.idx - 1);\n    };\n    window.addEventListener('keydown', this._onKey);\n  }\n  componentWillUnmount() {\n    window.removeEventListener('keydown', this._onKey);\n  }\n\n  sections() {\n    const el = this.scrollRef.current;\n    return el ? Array.from(el.querySelectorAll('[data-screen-label]')) : [];\n  }\n\n  // ---- Phone normalization: builds display (00966/00967), tel: and wa.me links ----\n  num(raw) {\n    let d = String(raw).replace(/[^\\d]/g, '');\n    if (d.startsWith('00')) d = d.slice(2);\n    let cc, local;\n    if (d.startsWith('966')) { cc = '966'; local = d.slice(3); }\n    else if (d.startsWith('967')) { cc = '967'; local = d.slice(3); }\n    else {\n      if (d.startsWith('0')) d = d.slice(1);\n      cc = d.startsWith('5') ? '966' : '967'; // 05x = Saudi, else Yemeni\n      local = d;\n    }\n    if (local.startsWith('0')) local = local.slice(1);\n    const intl = cc + local;\n    // light grouping: 3-3-rest from the right for readability\n    const disp = local.replace(/(\\d{3})(?=\\d)/g, '$1 ').trim();\n    return {\n      display: '00' + cc + ' ' + disp,\n      tel: 'tel:+' + intl,\n      wa: 'https://wa.me/' + intl,\n    };\n  }\n\n  person(name, role, nums) {\n    return { name, role: role || '', hasRole: !!role, actions: nums.map(n => this.num(n)) };\n  }\n\n  refGroups() {\n    const p = (n, r, ...nums) => this.person(n, r, nums);\n    return [\n      { ord: 'أولًا', title: 'الوالد', people: [\n        p('رزاز أحمد عبدالسلام المرتبي', 'والد العريس', '+966551067910'),\n      ]},\n      { ord: 'ثانيًا', title: 'الأخوال', people: [\n        p('مختار صادق', 'المدير المالي لمركز السرطان في اليمن', '773697766'),\n        p('ماجد صادق', 'رئيس محكمة في محافظة إب', '777596202'),\n        p('عبدالله هزاع', 'ابن عمتي وصديق', '+966536401880'),\n      ]},\n      { ord: 'ثالثًا', title: 'الأصدقاء', people: [\n        p('حسام الكحلاني', 'صديق جامعة', '779988897'),\n        p('موسى الشريف', 'جاري في الحي السياسي، برج نوران، لمدة 4 سنوات', '738533335', '774834433'),\n        p('أمين سنان', 'صديق جامعة', '777515276'),\n      ]},\n      { ord: 'رابعًا', title: 'الجيران والمعارف', people: [\n        p('علي مرحبا', 'ساعي في الحي السياسي', '770791551'),\n        p('د. طه الناشري', 'البيت الأخير', '775565565'),\n        p('د. إبراهيم الناشري', 'بيت أول', '+967777544885'),\n      ]},\n      { ord: 'خامسًا', title: 'المدراء الذين عملت معهم', people: [\n        p('م. كمال الهمداني', 'مالك ومدير Otek IT', '+967733848888', '+967771577799'),\n        p('م. محمود القدسي', 'مالك ومدير Venus — يفضل التواصل عبر واتساب', '+967733663312'),\n        p('م. أسامة نعمان', 'شريك Otek IT', '+966558807769'),\n        p('م. عبدالحميد جمال', 'مالك ومدير Shubak Agency', '0544449591'),\n        p('م. أيمن مبارك', 'مالك ومدير Pin.sa', '+966566744766'),\n        p('عيسى الشافعي', '', '0573735150'),\n      ]},\n      { ord: 'سادسًا', title: 'زملاء العمل', people: [\n        p('رائد الحطامي', 'مصمم', '+967774151740'),\n        p('علاء الحمادي', 'مونتاج وبلوجر', '776863496'),\n        p('صهيب الصفعاني', 'مصمم', '776323710'),\n        p('الآء المقطري', 'إبداعي ومختص سوشال ميديا', '771770311'),\n        p('أميمة الغابري', 'رقابة وتقييم', '+967774813252'),\n        p('ليلى جحاف', 'Front End Developer', '+967735856907'),\n      ]},\n      { ord: 'سابعًا', title: 'أصدقاء مقربون', people: [\n        p('ماجد الشميري', 'المدير التنفيذي لمؤسسة إنجاز اليمن', '771170441'),\n        p('عمر باذيب', 'مدير تنفيذي، وكالة كيا', '777555715'),\n        p('عبدالجليل حيدر', 'مختص تسويق', '777111050'),\n        p('معين الإرياني', 'مصور', '+966500282394'),\n        p('هيثم العليمي', 'مدير عالم سمسم', '772918918'),\n        p('خالد سلام', 'المدير التنفيذي لشركة دوت نوشن', '775870707'),\n        p('عبدالوهاب شاس', 'مدير التسويق في بنك الكريمي الإسلامي', '775337850'),\n      ]},\n    ];\n  }\n\n  // Scroll To Method: smooth-scroll the container to a section\n  goToSection = (i) => {\n    const el = this.scrollRef.current;\n    const secs = this.sections();\n    const clamped = Math.max(0, Math.min(this.TOTAL - 1, i));\n    if (el && secs[clamped]) el.scrollTo({ top: secs[clamped].offsetTop, behavior: 'smooth' });\n  };\n\n  // Scroll to Top Button target\n  scrollToTop = () => {\n    const el = this.scrollRef.current;\n    if (el) el.scrollTo({ top: 0, behavior: 'smooth' });\n  };\n\n  // Scroll Event: progress bar, active section, top-button visibility\n  handleScroll = () => {\n    if (this._raf) return;\n    this._raf = requestAnimationFrame(() => {\n      this._raf = null;\n      const el = this.scrollRef.current;\n      if (!el) return;\n      const max = el.scrollHeight - el.clientHeight;\n      const progress = max > 0 ? el.scrollTop / max : 0;\n      const mid = el.scrollTop + el.clientHeight / 2;\n      let idx = 0;\n      this.sections().forEach((s, i) => { if (s.offsetTop <= mid) idx = i; });\n      this.setState({ progress, idx, showTop: el.scrollTop > 300 });\n    });\n  };\n\n  renderVals() {\n    const { stage, idx } = this.state;\n    const opened = stage === 'opening' || stage === 'letter' || stage === 'slides';\n    const dots = [];\n    for (let i = 0; i < this.TOTAL; i++) {\n      dots.push({\n        size: i === idx ? '30px' : '9px',\n        bg: i === idx ? 'oklch(48% 0.13 18)' : 'oklch(84% 0.015 75)',\n        go: () => this.goToSection(i),\n      });\n    }\n    return {\n      showEnvelope: stage === 'closed' || stage === 'opening',\n      showLetter: stage === 'letter',\n      showSlides: stage === 'slides',\n      openEnvelope: () => {\n        if (this.state.stage !== 'closed') return;\n        this.setState({ stage: 'opening' });\n        setTimeout(() => this.setState({ stage: 'letter' }), 1150);\n      },\n      startSlides: () => this.setState({ stage: 'slides', idx: 0 }),\n      flapTransform: opened ? 'rotateX(180deg)' : 'rotateX(0deg)',\n      flapZ: opened ? 0 : 4,\n      sealScale: opened ? 0 : 1,\n      letterPeekTransform: opened ? 'translateY(-150px)' : 'translateY(0)',\n      scrollRef: this.scrollRef,\n      onScroll: this.handleScroll,\n      scrollToTop: this.scrollToTop,\n      topBtnOpacity: this.state.showTop ? 1 : 0,\n      topBtnEvents: this.state.showTop ? 'auto' : 'none',\n      progressW: Math.round(this.state.progress * 100) + '%',\n      counter: (idx + 1) + ' / ' + this.TOTAL,\n      refGroups: this.refGroups(),\n      momNum: this.num('779814384'),\n      contactSA: this.num('0509013311'),\n      contactYE: this.num('777133113'),\n      dots,\n      lastUpdated: new Date().toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
